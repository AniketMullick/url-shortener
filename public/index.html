  <title>Link Shortener</title>

<body>
  <div class="grid-bg"></div>
  <div class="wrap" id="wrap">
  <p class="eyebrow">link shortener</p>
  <h1 class="headline">Short links,<br><em>instantly.</em></h1>
  <p class="sub">Paste a long URL, get something Clean - Smooth, Fast, Smart.</p>
  <div class="card" id="card">
    <div class="input-row">
      <input class="url-input" type="text" placeholder="https://your-very-long-url.com/goes/here" id="urlInput" />
      <button class="shorten-btn" id="shorten-btn">Shorten</button>
    </div>
    <div class="result-box" id="resultBox">
      <a class="short-link" id="shortLink" href="#"></a>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <hr class="divider" />
    <p class="history-label">Your recent links:</p>
    <div class="history-list" id="historyList">
    </div>
  </div>
  </div>
